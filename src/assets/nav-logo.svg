<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48" role="img">
  <title>QurbaniHaat Nav Logo</title>

  <!-- Icon background pill -->
  <rect x="2" y="6" width="36" height="36" rx="10" fill="#1a5c3a"/>

  <!-- Cow head silhouette (stylized geometric) -->
  <!-- Body -->
  <ellipse cx="20" cy="26" rx="9" ry="7" fill="#ffffff"/>
  <!-- Head -->
  <ellipse cx="20" cy="16" rx="6" ry="5.5" fill="#ffffff"/>
  <!-- Left ear -->
  <ellipse cx="13.5" cy="14" rx="2.5" ry="1.6" fill="#ffffff" transform="rotate(-20 13.5 14)"/>
  <!-- Right ear -->
  <ellipse cx="26.5" cy="14" rx="2.5" ry="1.6" fill="#ffffff" transform="rotate(20 26.5 14)"/>
  <!-- Left horn -->
  <path d="M15 12 Q12 8 14 7 Q15 9 16 11Z" fill="#d4a843"/>
  <!-- Right horn -->
  <path d="M25 12 Q28 8 26 7 Q25 9 24 11Z" fill="#d4a843"/>
  <!-- Nose -->
  <ellipse cx="20" cy="19" rx="3" ry="2" fill="#1a5c3a"/>
  <!-- Nostril left -->
  <circle cx="18.5" cy="19.2" r="0.8" fill="#ffffff"/>
  <!-- Nostril right -->
  <circle cx="21.5" cy="19.2" r="0.8" fill="#ffffff"/>
  <!-- Left eye -->
  <circle cx="17" cy="14.5" r="1.2" fill="#1a5c3a"/>
  <!-- Right eye -->
  <circle cx="23" cy="14.5" r="1.2" fill="#1a5c3a"/>
  <!-- Legs (4 small rects) -->
  <rect x="13" y="31" width="3" height="7" rx="1.5" fill="#ffffff"/>
  <rect x="17" y="31" width="3" height="7" rx="1.5" fill="#ffffff"/>
  <rect x="21" y="31" width="3" height="7" rx="1.5" fill="#ffffff"/>
  <rect x="25" y="31" width="3" height="7" rx="1.5" fill="#ffffff"/>
  <!-- Tail -->
  <path d="M29 24 Q34 20 32 26" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Tail tuft -->
  <circle cx="32" cy="26.5" r="1.5" fill="#d4a843"/>

  <!-- Brand name -->
  <text x="48" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#1a5c3a" letter-spacing="-0.3">Qurbani</text>
  <text x="48" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="400" fill="#d4a843" letter-spacing="1.5">HAAT</text>

  <!-- Tagline dot separator -->
  <circle cx="128" cy="38" r="1.5" fill="#1a5c3a" opacity="0.4"/>
</svg>
